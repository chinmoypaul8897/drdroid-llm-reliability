apiVersion: v1
kind: Namespace
metadata:
  name: ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-ui
  namespace: ui
  labels:
    app: chat-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-ui
  template:
    metadata:
      labels:
        app: chat-ui
    spec:
      containers:
        - name: chat-ui
          image: drdroid-chat-ui:0.1.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: chat-ui
  namespace: ui
  labels:
    app: chat-ui
spec:
  type: ClusterIP
  selector:
    app: chat-ui
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
