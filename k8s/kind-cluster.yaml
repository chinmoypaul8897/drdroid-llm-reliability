kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: drdroid-llm
nodes:
  - role: control-plane
    image: kindest/node:v1.30.4
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      - containerPort: 30090
        hostPort: 9090
        protocol: TCP
      - containerPort: 30030
        hostPort: 3000
        protocol: TCP
