apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: llm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: llm
  labels:
    app: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:0.4.7
          ports:
            - containerPort: 11434
              name: http
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_KEEP_ALIVE
              value: "24h"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "3000m"
              memory: "3Gi"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - "ollama list | grep -q 'llama3.2:1b'"
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: 11434
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "ollama list | grep -q 'llama3.2:1b'"
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
        - name: exporter
          image: ollama-exporter:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9101
              name: metrics
          env:
            - name: OLLAMA_URL
              value: "http://localhost:11434"
            - name: PROBE_MODEL
              value: "llama3.2:1b"
            - name: POLL_INTERVAL
              value: "30"
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "96Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9101
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: llm
  labels:
    app: ollama
spec:
  type: ClusterIP
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434
      protocol: TCP
    - name: metrics
      port: 9101
      targetPort: 9101
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ollama
  namespace: llm
  labels:
    app: ollama
    release: kps
spec:
  selector:
    matchLabels:
      app: ollama
  namespaceSelector:
    matchNames:
      - llm
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
