# Minimal kube-prometheus-stack values for 8GB laptop
# Keeps: Prometheus, Grafana, Alertmanager, node-exporter, kube-state-metrics
# Trims: resource limits, retention, disabled heavy features

prometheus:
  prometheusSpec:
    retention: 6h
    retentionSize: "1GiB"
    resources:
      requests:
        cpu: 50m
        memory: 200Mi
      limits:
        cpu: 500m
        memory: 500Mi
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi

grafana:
  adminPassword: "drdroid-demo"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  service:
    type: NodePort
    nodePort: 30030
  persistence:
    enabled: false
  defaultDashboardsEnabled: true
  plugins: []

kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi
  hostRootFsMount:
    enabled: false

# Disable components not essential for our demo
prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Disable components that waste memory in kind
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false
defaultRules:
  rules:
    etcd: false
    kubeControllerManager: false
    kubeScheduler: false
    kubeProxyAvailability: false
